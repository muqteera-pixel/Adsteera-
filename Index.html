<!DOCTYPE html>
<html>
<head>
    <title>Calculator App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }

        .calculator {
            width: 320px;
            margin: 40px auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            height: 50px;
            font-size: 22px;
            text-align: right;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        button {
            width: 70px;
            height: 50px;
            font-size: 18px;
            margin: 5px;
            border-radius: 5px;
        }

        .ad-btn {
            background: green;
            width: 100%;
            color: white;
        }
    </style>
</head>

<body>

<h2>Calculator 💻</h2>

<div class="calculator">

<input type="text" id="result" disabled>

<br>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button>

<br>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button>

<br>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<br>

<button onclick="press('0')">0</button>
<button onclick="calculate()">=</button>
<button onclick="clearResult()">C</button>
<button onclick="press('+')">+</button>

<br><br>

<p>Support us ❤️ Click below</p>

<button class="ad-btn" onclick="watchAd()">Watch Ad & Continue</button>

</div>

<script>
let result = document.getElementById("result");

function press(val) {
    result.value += val;
}

function calculate() {
    try {
        result.value = Function("return " + result.value)();
    } catch {
        result.value = "Error";
    }
}

function clearResult() {
    result.value = "";
}

function watchAd() {
    window.open(
        "https://www.profitablecpmratenetwork.com/tnunp5qqq?key=01e80a1d5301392d379177ac3c816f68",
        "_blank",
        "noopener,noreferrer"
    );
}
</script>

</body>
</html>
